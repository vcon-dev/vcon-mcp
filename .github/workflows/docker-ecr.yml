name: Build and Push to ECR Public

# On push to main: build and push image with tags `main-<7sha>` and `latest`.
# On push of a `v*` git tag: additionally tag with semver `1.2.3`, `1.2`, `1`
#   and auto-create a GitHub Release.
# On pull_request: build only (no push).

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

env:
  ECR_REGISTRY: public.ecr.aws/r4g1k2s3
  ECR_REPOSITORY: vcon-dev/vcon-mcp
  IMAGE_NAME: public.ecr.aws/r4g1k2s3/vcon-dev/vcon-mcp

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # softprops/action-gh-release needs this for tag releases
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compute version metadata
        id: version
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            VERSION="main-${SHORT_SHA}"
          fi
          {
            echo "short_sha=${SHORT_SHA}"
            echo "version=${VERSION}"
            echo "build_time=${BUILD_TIME}"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET }}
          aws-region: us-east-1   # ECR Public is always us-east-1

      - name: Login to Amazon ECR Public
        id: login-ecr-public
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: public

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=main-${{ steps.version.outputs.short_sha }},enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
          provenance: false   # ECR Public compatibility
          build-args: |
            VCON_MCP_VERSION=${{ steps.version.outputs.version }}
            VCON_MCP_GIT_COMMIT=${{ steps.version.outputs.short_sha }}
            VCON_MCP_BUILD_TIME=${{ steps.version.outputs.build_time }}

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          name: Release ${{ steps.version.outputs.version }}
          body: |
            ## vCon MCP Server ${{ steps.version.outputs.version }}

            **Git Commit:** `${{ steps.version.outputs.short_sha }}`
            **Build Time:** `${{ steps.version.outputs.build_time }}`

            ### Pull
            ```bash
            docker pull ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ```
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Output image digest
        if: github.event_name != 'pull_request'
        run: |
          {
            echo "## Docker Image Published :whale:"
            echo ""
            echo "**Registry:** \`${{ env.ECR_REGISTRY }}\`"
            echo "**Repository:** \`${{ env.ECR_REPOSITORY }}\`"
            echo ""
            echo "### Version Info"
            echo "- **Version:** \`${{ steps.version.outputs.version }}\`"
            echo "- **Git Commit:** \`${{ steps.version.outputs.short_sha }}\`"
            echo "- **Build Time:** \`${{ steps.version.outputs.build_time }}\`"
            echo ""
            echo "**Tags:**"
            echo '```'
            echo "${{ steps.meta.outputs.tags }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  # Smoke-test the published image
  test-image:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET }}
          aws-region: us-east-1

      - name: Login to Amazon ECR Public
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: public

      - name: Resolve test tag
        id: tag
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Test help command
        run: docker run --rm ${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }} help

      - name: Test script listing
        run: docker run --rm ${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }} script nonexistent 2>&1 || true
