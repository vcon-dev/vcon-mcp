# Mosquitto MQTT Broker Configuration
# vCon Intelligence Platform — Hackathon

# MQTT listener (standard)
listener 1883
protocol mqtt

# WebSocket listener (for browser dashboard)
listener 9001
protocol websockets

# Allow anonymous for hackathon (secure in production)
allow_anonymous true

# Persistence
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest file /mosquitto/log/mosquitto.log
log_type all
